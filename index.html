<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Platform V8</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    margin:0;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

nav{
    background:black;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
}
nav button{
    flex:1 1 40%;
    max-width:48%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:cyan;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

section{display:none;padding:15px}
.active{display:block}

.card{
    background:white;
    color:black;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
    font-weight:bold;
}

.action{background:limegreen;}
.delete{background:red;color:white;}
.openBtn{background:#203a43;color:white;}

video{
    width:100%;
    border-radius:10px;
}

@media(min-width:768px){
nav button{
    flex:none;
    max-width:none;
}
}
</style>
</head>

<body>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('books')">الكتب</button>
<button onclick="show('summaries')">الملخصات</button>
<button onclick="show('videos')">الفيديوهات</button>
<button onclick="show('studentWorks')">أعمال الطلاب</button>
<button onclick="show('login')">دخول المعلم</button>
</nav>

<section id="home" class="active">
<h2>🔥 Beast Education Platform 🔥</h2>
</section>

<section id="books"><h2>📚 الكتب</h2><div id="bookList"></div></section>
<section id="summaries"><h2>📝 الملخصات</h2><div id="summaryList"></div></section>
<section id="videos"><h2>🎥 الفيديوهات</h2><div id="videoList"></div></section>
<section id="studentWorks"><h2>👨‍🎓 أعمال الطلاب</h2><div id="studentList"></div></section>

<section id="login">
<h2>🔐 دخول المعلم</h2>
<input type="password" id="pass">
<button class="action" onclick="login()">دخول</button>
<p id="msg"></p>
</section>

<section id="panel">
<h2>👑 لوحة المعلم</h2>

<h3>رفع كتاب PDF</h3>
<input type="text" id="bookTitle">
<input type="file" id="bookFile" accept="application/pdf">
<button class="action" onclick="saveFile('books','bookTitle','bookFile')">رفع</button>

<h3>رفع ملخص PDF</h3>
<input type="text" id="sumTitle">
<input type="file" id="sumFile" accept="application/pdf">
<button class="action" onclick="saveFile('summaries','sumTitle','sumFile')">رفع</button>

<h3>رفع فيديو</h3>
<input type="text" id="vidTitle">
<input type="file" id="vidFile" accept="video/*">
<button class="action" onclick="saveFile('videos','vidTitle','vidFile')">رفع</button>

<h3>إضافة عمل طالب</h3>
<input type="text" id="studentName">
<input type="text" id="workTitle">
<input type="file" id="workFile" accept=".pdf,image/*">
<button class="action" onclick="saveStudentWork()">رفع</button>

<hr>

<h3>🗑 إدارة المحتوى</h3>

<h4>الكتب</h4>
<div id="manageBooks"></div>

<h4>الملخصات</h4>
<div id="manageSummaries"></div>

<h4>الفيديوهات</h4>
<div id="manageVideos"></div>

<h4>أعمال الطلاب</h4>
<div id="manageStudents"></div>

<button onclick="logout()" class="delete">خروج</button>
</section>

<script>
let db;
let request=indexedDB.open("BeastDB_V8",1);

request.onupgradeneeded=function(e){
db=e.target.result;
["books","summaries","videos","studentWorks"].forEach(store=>{
if(!db.objectStoreNames.contains(store))
db.createObjectStore(store,{keyPath:"id",autoIncrement:true});
});
};

request.onsuccess=function(e){
db=e.target.result;
refreshAll();
};

function refreshAll(){
loadDisplay("books","bookList");
loadDisplay("summaries","summaryList");
loadDisplay("videos","videoList");
loadDisplay("studentWorks","studentList");
loadManage();
}

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function login(){
if(document.getElementById("pass").value==="1234"){
show("panel");
refreshAll();
}else{
document.getElementById("msg").innerText="❌ خطأ";
}
}

function logout(){
show("home");
}

function saveFile(store,titleId,fileId){
let title=document.getElementById(titleId).value;
let file=document.getElementById(fileId).files[0];
if(!file||!title)return alert("اكمل البيانات");

let reader=new FileReader();
reader.onload=function(){
let tx=db.transaction(store,"readwrite");
tx.objectStore(store).add({title:title,data:reader.result});
tx.oncomplete=refreshAll;
};
reader.readAsDataURL(file);
}

function saveStudentWork(){
let name=document.getElementById("studentName").value;
let title=document.getElementById("workTitle").value;
let file=document.getElementById("workFile").files[0];
if(!file||!name||!title)return;

let reader=new FileReader();
reader.onload=function(){
let tx=db.transaction("studentWorks","readwrite");
tx.objectStore("studentWorks").add({student:name,title:title,data:reader.result});
tx.oncomplete=refreshAll;
};
reader.readAsDataURL(file);
}

function deleteItem(store,id){
if(!confirm("تأكيد الحذف؟"))return;
let tx=db.transaction(store,"readwrite");
tx.objectStore(store).delete(id);
tx.oncomplete=refreshAll;
}

function openFile(data){
let arr=data.split(',');
let mime=arr[0].match(/:(.*?);/)[1];
let bstr=atob(arr[1]);
let n=bstr.length;
let u8arr=new Uint8Array(n);
while(n--){u8arr[n]=bstr.charCodeAt(n);}
let blob=new Blob([u8arr],{type:mime});
let url=URL.createObjectURL(blob);
window.open(url,"_blank");
}

function loadDisplay(store,containerId){
let tx=db.transaction(store,"readonly");
let request=tx.objectStore(store).getAll();
request.onsuccess=function(){
let container=document.getElementById(containerId);
container.innerHTML="";
request.result.forEach(item=>{
if(store==="videos"){
container.innerHTML+=`
<div class="card">
<h3>${item.title}</h3>
<video controls src="${item.data}"></video>
</div>`;
}else if(store==="studentWorks"){
container.innerHTML+=`
<div class="card">
<h3>${item.student}</h3>
<p>${item.title}</p>
<button class="openBtn" onclick="openFile('${item.data}')">فتح</button>
</div>`;
}else{
container.innerHTML+=`
<div class="card">
<h3>${item.title}</h3>
<button class="openBtn" onclick="openFile('${item.data}')">فتح</button>
</div>`;
}
});
};
}

function loadManage(){
loadManageStore("books","manageBooks");
loadManageStore("summaries","manageSummaries");
loadManageStore("videos","manageVideos");
loadManageStore("studentWorks","manageStudents");
}

function loadManageStore(store,containerId){
let tx=db.transaction(store,"readonly");
let request=tx.objectStore(store).getAll();
request.onsuccess=function(){
let container=document.getElementById(containerId);
container.innerHTML="";
request.result.forEach(item=>{
container.innerHTML+=`
<div class="card">
<h4>${store==="studentWorks"?item.student+" - "+item.title:item.title}</h4>
<button class="delete" onclick="deleteItem('${store}',${item.id})">❌ حذف</button>
</div>`;
});
};
}
</script>

</body>
</html>
